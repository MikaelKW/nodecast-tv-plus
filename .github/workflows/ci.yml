name: CI

on:
  pull_request:
    branches: [develop, testing, main]
  push:
    branches: [develop, testing]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  application-checks:
    name: Application checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run application checks
        run: npm test

      - name: Install browsers for integration tests
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser and media integration tests
        run: npm run test:e2e

      - name: Run mobile WebKit layout tests
        run: npm run test:e2e:mobile

      - name: Run reverse-proxy subpath tests
        run: npm run test:e2e:subpath

      - name: Upload browser test diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Block high and critical dependency advisories
        run: npm audit --audit-level=high --omit=dev

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: application-checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without publishing
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: nodecast-tv-plus:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container health
        shell: bash
        run: |
          jwt_secret="$(openssl rand -hex 48)"
          session_secret="$(openssl rand -hex 48)"
          container_id="$(docker run -d --name nodecast-health-ci \
            -e NODE_ENV=production \
            -e JWT_SECRET="$jwt_secret" \
            -e SESSION_SECRET="$session_secret" \
            -p 127.0.0.1::3000 \
            nodecast-tv-plus:ci)"
          trap 'docker rm -f nodecast-health-ci >/dev/null 2>&1 || true' EXIT

          for attempt in {1..40}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' "$container_id")"
            if [ "$status" = "healthy" ]; then
              break
            fi
            if [ "$status" = "unhealthy" ]; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 2
          done

          test "$(docker inspect --format '{{.State.Health.Status}}' "$container_id")" = "healthy"
          host_port="$(docker port "$container_id" 3000/tcp | awk -F: '{print $NF}')"
          curl -fsS "http://127.0.0.1:${host_port}/api/health" | grep -q '"status":"ok"'

      - name: Verify upstream migration compatibility
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.base_ref == 'main') }}
        run: npm run test:migration
        env:
          NODECAST_MIGRATION_CANDIDATE_IMAGE: nodecast-tv-plus:ci
